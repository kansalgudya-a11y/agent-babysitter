name: AgentBabysitter
options:
  bundleIdPrefix: app.agentbabysitter
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
packages:
  AgentBabysitterCore:
    path: AgentBabysitterCore
targets:
  AgentBabysitter:
    type: application
    platform: macOS
    sources:
      - App/Sources
      - path: App/Resources
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        # Notification Center (and other modern surfaces) resolve the icon
        # via the compiled asset catalog only — the legacy .icns alone shows
        # a blank icon on banners.
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        # PLACEHOLDER: replace "Agent Babysitter" with the legal owner
        # (your name or registered company) before a paid release. Shown in
        # Finder's Get Info panel and the About box.
        NSHumanReadableCopyright: "Copyright © 2026 Agent Babysitter. All rights reserved."
    dependencies:
      - package: AgentBabysitterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.agentbabysitter.AgentBabysitter
        MARKETING_VERSION: 0.11.3
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"               # ad-hoc until Developer ID lands
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
      configs:
        Release:
          ARCHS: arm64 x86_64                 # universal for distribution
          ONLY_ACTIVE_ARCH: NO
          # Xcode injects com.apple.security.get-task-allow into ad-hoc/dev
          # signed builds so a debugger can attach. Shipping it in Release is
          # both a security hole (any local process can task_for_pid the app
          # and read the OAuth tokens it holds in memory) and an automatic
          # notarization rejection. Suppressing base-entitlement injection
          # here drops get-task-allow from the Release binary; the app has no
          # entitlements file, so no other entitlements are affected. Verify
          # after building with: codesign -d --entitlements - <app>
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
