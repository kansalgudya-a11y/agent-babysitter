name: AgentBabysitter
options:
  bundleIdPrefix: app.agentbabysitter
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
packages:
  AgentBabysitterCore:
    path: AgentBabysitterCore
targets:
  AgentBabysitter:
    type: application
    platform: macOS
    sources:
      - App/Sources
      - path: App/Resources
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        NSHumanReadableCopyright: ""
    dependencies:
      - package: AgentBabysitterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.agentbabysitter.AgentBabysitter
        MARKETING_VERSION: 0.6.15
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"               # ad-hoc until Developer ID lands
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
      configs:
        Release:
          ARCHS: arm64 x86_64                 # universal for distribution
          ONLY_ACTIVE_ARCH: NO
