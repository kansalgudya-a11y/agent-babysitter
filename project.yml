name: AgentBabysitter
options:
  bundleIdPrefix: app.agentbabysitter
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
packages:
  AgentBabysitterCore:
    path: AgentBabysitterCore
targets:
  AgentBabysitter:
    type: application
    platform: macOS
    sources:
      - App/Sources
    dependencies:
      - package: AgentBabysitterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.agentbabysitter.AgentBabysitter
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES        # menu bar only, no dock icon
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"               # ad-hoc until Developer ID lands
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
      configs:
        Release:
          ARCHS: arm64 x86_64                 # universal for distribution
          ONLY_ACTIVE_ARCH: NO
